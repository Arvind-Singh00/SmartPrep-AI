services:
  - type: web
    name: smartprep-backend
    env: node
    plan: free
    region: oregon
    buildCommand: "cd backend && npm install"
    startCommand: "cd backend && npm start"
    autoDeploy: true
    envVars:
      # Add required environment variables as Render Service Environment variables
      # Example (do NOT store secrets here in plain text):
      # - key: MONGODB_URI
      #   value: ${MONGODB_URI}
      # - key: JWT_SECRET
      #   value: ${JWT_SECRET}

  - type: web
    name: smartprep-frontend
    env: static
    plan: free
    region: oregon
    buildCommand: "npm install && npx vite build"
    staticPublishPath: ./dist
    autoDeploy: true
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        value: https://smartprep-ai-61yc.onrender.com/api
      - key: VITE_USE_MOCK
        value: false
